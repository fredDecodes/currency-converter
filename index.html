<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Currency Converter</h1>
    <div class="currency-container">
      <select id="currency-menu1">
        <option value="AUD">AUD</option>
        <option value="CAD">CAD</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
        <option value="INR">INR</option>
        <option value="JPY">JPY</option>
        <option value="USD">USD</option>
        <option value="GHS" selected>GHS</option>
      </select>
      <input type="number" id="menu1-value" value="1" min="0">
    </div>
    <div class="currency-container">
      <select id="currency-menu2">
        <option value="AUD">AUD</option>
        <option value="CAD">CAD</option>
        <option value="EUR" selected>EUR</option>
        <option value="GBP">GBP</option>
        <option value="INR">INR</option>
        <option value="JPY">JPY</option>
        <option value="USD">USD</option>
        <option value="GHS">GHS</option>
      </select>
      <input type="number" id="menu2-value" disabled>
    </div>
    <p class="exchange-rate" id="exchange-rate">To Be Updated Dynamically</p>
  </div>
  <script src="config.js"></script>
  <script src="index.js"></script>
</body>
</html>
